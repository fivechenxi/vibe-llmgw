# LLM Gateway Test Configuration
# Used for Docker-based black-box testing environment

env: test

server:
  port: "8080"

database:
  dsn: "postgres://llmgw:llmgw_test_password@postgres:5432/llmgw_test?sslmode=disable"

jwt:
  secret: "test-jwt-secret-for-blackbox-testing"
  expire_hours: 24

sso:
  provider: "mock"  # Mock SSO for testing

providers:
  openai:
    api_key: "your-openai-compatible-key"
    base_url: "https://api.openai.com/v1"
  anthropic:
    api_key: "your-anthropic-compatible-key"
    base_url: ""                                   # leave empty to use https://api.anthropic.com
  deepseek:
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
  alibaba:
    api_key: "your-alibaba-compatible-key"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  baidu:
    api_key: ""
    secret_key: ""

proxy: ""  # No proxy for test environment
